name: 2010 Football Schedule Checker

on:
  workflow_dispatch:  # lets you run it manually with a button click

jobs:
  check-schedules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run schedule checker
        run: python Schedule_Checker.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: schedule-checker-results
          path: |
            mshsaa_missing_games.csv
            mshsaa_school_ids.csv
